version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: track_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-track_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-track_password}
      POSTGRES_DB: ${POSTGRES_DB:-track_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-track_user} -d ${POSTGRES_DB:-track_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: track_api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-track_user}:${POSTGRES_PASSWORD:-track_password}@db:5432/${POSTGRES_DB:-track_db}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
